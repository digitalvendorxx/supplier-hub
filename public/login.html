<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Supplier Hub — Giriş</title>
<link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
<div class="login-card">
  <h1>Supplier Hub</h1>
  <p class="sub">Hesabınıza giriş yapın</p>
  <form id="loginForm">
    <label>E-posta</label>
    <input type="email" id="email" required autocomplete="email" />
    <label>Şifre</label>
    <input type="password" id="password" required autocomplete="current-password" />
    <button type="submit">Giriş yap</button>
    <div id="err" class="err"></div>
  </form>
  <div class="login-foot">
    Hesabın yok mu? <a href="/signup.html">Kayıt ol</a>
  </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();
  const err = document.getElementById('err');
  err.textContent = '';
  const r = await fetch('/api/auth/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      email: document.getElementById('email').value,
      password: document.getElementById('password').value,
    }),
  });
  const data = await r.json();
  if (!r.ok) { err.textContent = data.error || 'Giriş başarısız'; return; }
  location.href = '/';
});

// Auto-redirect if already logged in
fetch('/api/auth/me').then(r => { if (r.ok) location.href = '/'; });
</script>
</body>
</html>
